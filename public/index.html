<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>llmdash</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="wordmark">llmdash</div>
      <div class="freshness" id="freshness"><span class="pulse"></span><span id="age">connecting…</span></div>
    </header>

    <div id="headroom" class="headroom" hidden></div>
    <div id="tools"></div>
    <!-- Multi-host section. Empty (and unused) in single-host mode, where #tools
         above renders exactly today. Populated only when >1 host is configured. -->
    <div id="hosts"></div>

    <section class="insights-section" id="codex-insights" aria-labelledby="codex-insights-title">
      <div class="insights-head">
        <div>
          <div class="insights-title" id="codex-insights-title"><span class="insights-mark" aria-hidden="true">▲</span>Codex insights</div>
          <div class="insights-sub">This machine · structured local Codex metadata · <span id="insights-range-copy">last 7 days</span></div>
        </div>
        <div class="range insights-range" id="insights-range" aria-label="Codex insight range">
          <button class="pill" data-range="24h" aria-pressed="false">24h</button>
          <button class="pill active" data-range="7d" aria-pressed="true">7d</button>
          <button class="pill" data-range="30d" aria-pressed="false">30d</button>
        </div>
      </div>
      <div class="insights-status" id="insights-status" role="status">Loading…</div>
      <div class="insight-surface" id="insights-surface" aria-busy="true">
        <div class="insights-state">Reading local Codex session metadata…</div>
      </div>
    </section>

    <section class="trends-section" aria-labelledby="trends-title">
      <div class="trends-head">
        <div class="section-label trends-title" id="trends-title">Trends</div>
        <div class="range" id="range" aria-label="Trend range">
          <button class="pill" data-range="24h" aria-pressed="false">24h</button>
          <button class="pill active" data-range="7d" aria-pressed="true">7d</button>
          <button class="pill" data-range="30d" aria-pressed="false">30d</button>
        </div>
      </div>
      <div id="trends"></div>
    </section>

    <footer>
      <span>Limits: account-wide · Activity: local session logs · Codex day buckets: UTC</span>
      <span>served over Tailscale</span>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
