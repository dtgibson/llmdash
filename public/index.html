<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>llmdash</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="wordmark">llmdash</div>
    <div class="freshness" id="freshness"><span class="pulse"></span><span id="age">connecting…</span></div>
  </header>

  <div id="headroom" class="headroom" hidden></div>
  <div id="tools"></div>

  <div class="trends-head">
    <div class="section-label" style="margin:0">Trends</div>
    <div class="range" id="range">
      <button class="pill" data-range="24h">24h</button>
      <button class="pill active" data-range="7d">7d</button>
      <button class="pill" data-range="30d">30d</button>
    </div>
  </div>
  <div id="trends"></div>

  <footer>
    <span>Limits: account-wide · Activity: from local session logs</span>
    <span>served over Tailscale</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
