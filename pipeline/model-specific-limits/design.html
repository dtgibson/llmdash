<!doctype html>
<meta charset="utf-8">
<title>Model-specific limits mock</title>
<style>
  body { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#fafafa; color:#15171a; padding:24px; max-width:720px; margin:auto; }
  .section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em; font-weight: 600; color: #6b7280; margin: 22px 2px 10px; }
  .model-limits { margin: 14px 0 16px; }
  .model-limit-grid { display:grid; gap:10px; }
  .model-limit { border:1px solid #e6e6e6; background:#fff; border-radius:10px; padding:12px 14px; }
  .model-limit-head { display:flex; justify-content:space-between; gap:12px; align-items:baseline; }
  .model-name { font-weight:600; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .model-window, .model-reset { color:#6b7280; font-size:.76rem; }
  .model-remaining { font:600 1.35rem ui-monospace, SFMono-Regular, Menlo, monospace; color:#16a34a; }
  .bar { height:6px; background:#eceef0; border-radius:999px; overflow:hidden; margin-top:8px; }
  .bar-fill { width:51%; height:100%; background:#16a34a; border-radius:999px; }
  .model-limit-note { color:#6b7280; font-size:.76rem; margin-top:8px; }
</style>
<section>
  <div class="section-label">model-specific limits</div>
  <div class="model-limit-grid">
    <div class="model-limit">
      <div class="model-limit-head">
        <div>
          <div class="model-name">Fable</div>
          <div class="model-window">Weekly cap</div>
        </div>
        <div>
          <div class="model-remaining">51%</div>
          <div class="model-reset">resets in 1d 23h</div>
        </div>
      </div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>
  </div>
  <div class="model-limit-note">Model-specific caps are inside Claude Code; they do not add account-wide budget.</div>
</section>
