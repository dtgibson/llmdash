<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu Model Limits Dropdown</title>
  <style>
    :root {
      color-scheme: light;
      --text: #111111;
      --header: #1f1f1f;
      --subtle: #333333;
      --good: #17783c;
      --warn: #8a5a00;
      --crit: #b3261e;
      --rule: #d7d7d7;
      --surface: #f8f8f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #e9eaec;
      color: var(--text);
      font: 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    .menu {
      width: min(420px, calc(100vw - 32px));
      background: var(--surface);
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, .22);
      padding: 6px 0;
    }

    .row {
      min-height: 24px;
      display: flex;
      align-items: center;
      padding: 3px 14px;
      white-space: nowrap;
    }

    .header {
      font-size: 14px;
      color: var(--header);
    }

    .subhead {
      font-size: 12px;
      color: var(--subtle);
      margin-top: 2px;
    }

    .mono {
      font-family: Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .good {
      color: var(--good);
    }

    .warn {
      color: var(--warn);
    }

    .crit {
      color: var(--crit);
    }

    .rule {
      height: 1px;
      background: var(--rule);
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <main class="menu" aria-label="SwiftBar dropdown mock">
    <div class="row header">▪ 84% remaining - Claude Code · Weekly</div>
    <div class="rule"></div>
    <div class="row header">Claude Code</div>
    <div class="row mono good">5-hour: 86% · resets 4h 12m</div>
    <div class="row mono good">Weekly: 92% · resets 5d 8h</div>
    <div class="row subhead">Model limits</div>
    <div class="row mono good">Fable: 84% · resets 5d 8h</div>
    <div class="row mono warn">Sonnet 4.5: 34% · resets 5d 8h</div>
    <div class="rule"></div>
    <div class="row header">Codex</div>
    <div class="row mono good">5-hour: 53% · resets 1h 21m</div>
    <div class="row mono good">Weekly: 93% · resets 6d 4h</div>
  </main>
</body>
</html>
